services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rca_db
      MYSQL_USER: rca_user
      MYSQL_PASSWORD: rca_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/mysql_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_pass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: mysql+pymysql://rca_user:rca_pass@mysql:3306/rca_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: mysql+pymysql://rca_user:rca_pass@mysql:3306/rca_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["rq", "worker", "default", "--url", "redis://redis:6379/0"]

  frontend:
    build: ./frontend
    ports:
      - "5000:5000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mysql_data:
